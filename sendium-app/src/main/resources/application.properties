smsg.routing.file.path=conf/routingTable.conf
smsg.properties.file.path=conf/smsg.properties
smsg.credentials.file.path=conf/credentials.yml

#logging
quarkus.log.level=${QUARKUS_LOG_LEVEL:INFO}
quarkus.log.category."gr.cytech".level=${LOG_LEVEL:INFO}
quarkus.log.console.enabled=${QUARKUS_LOG_CONSOLE_ENABLE:true}
quarkus.log.console.async.enabled=true

quarkus.log.console.format=%d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%c] (%t) %m%n

quarkus.log.file.enabled=${QUARKUS_LOG_FILE_ENABLE:false}
quarkus.log.file.async.enabled=true
quarkus.log.file.format=%d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%c] (%t) %s%n
quarkus.log.file.path=${QUARKUS_LOG_FILE_PATH:smsg.log}

quarkus.log.file.rotation.enabled=true
quarkus.log.file.rotation.max-file-size=100M
quarkus.log.file.rotation.rotate-on-boot=false
quarkus.log.file.rotation.max-backup-index=1

quarkus.log.handler.file."smppclient".enabled=${quarkus.log.file.enabled:false}
quarkus.log.handler.file."smppclient".async.enabled=true
quarkus.log.handler.file."smppclient".format=%d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%c] (%t) %s%n
quarkus.log.handler.file."smppclient".path=${QUARKUS_LOG_FILE_SMPPCLIENT_PATH:smppclient.log}
quarkus.log.handler.file."smppclient".rotation.enabled=true
quarkus.log.handler.file."smppclient".rotation.max-file-size=100M
quarkus.log.handler.file."smppclient".rotation.file-suffix=
quarkus.log.handler.file."smppclient".rotation.rotate-on-boot=false
quarkus.log.handler.file."smppclient".rotation.max-backup-index=1
quarkus.log.category."gr.cytech.sendium.core.smpp.client".level=${LOG_LEVEL:INFO}
quarkus.log.category."gr.cytech.sendium.core.smpp.client".handlers=smppclient
quarkus.log.category."gr.cytech.sendium.core.smpp.client".use-parent-handlers=${quarkus.log.console.enabled}

quarkus.log.handler.file."smppserver".enabled=${quarkus.log.file.enabled:false}
quarkus.log.handler.file."smppserver".async.enabled=true
quarkus.log.handler.file."smppserver".format=%d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%c] (%t) %s%n
quarkus.log.handler.file."smppserver".path=${QUARKUS_LOG_FILE_SMPPSERVER_PATH:smppserver.log}
quarkus.log.handler.file."smppserver".rotation.enabled=true
quarkus.log.handler.file."smppserver".rotation.max-file-size=100M
quarkus.log.handler.file."smppserver".rotation.file-suffix=
quarkus.log.handler.file."smppserver".rotation.rotate-on-boot=false
quarkus.log.handler.file."smppserver".rotation.max-backup-index=1
quarkus.log.category."gr.cytech.sendium.core.smpp.server".level=${LOG_LEVEL:INFO}
quarkus.log.category."gr.cytech.sendium.core.smpp.server".handlers=smppserver
quarkus.log.category."gr.cytech.sendium.core.smpp.server".use-parent-handlers=${quarkus.log.console.enabled}

quarkus.http.access-log.enabled=${QUARKUS_HTTP_ACCESS_LOG_ENABLE:true}
quarkus.http.access-log.log-to-file=${quarkus.log.file.enabled}
quarkus.http.access-log.base-file-name=httpapi
quarkus.http.access-log.log-suffix=.log
quarkus.http.access-log.log-directory=${QUARKUS_HTTP_ACCESS_LOG_DIRECTORY:}
quarkus.http.access-log.rotate=true
# %a:REMOTE IP %t:DateTime %m:METHOD %U:REQUEST URL path %H:PROTOCOL %s:RESPONSE_CODE %b:Bytes sent.
# Do not use %r or %q by default: /sendsms query parameters can contain credentials, phone numbers, and message text.
quarkus.http.access-log.pattern=%a(%{i,X-Forwarded-For}) %t %{i,X-REROUTE} "%m %U %H" %s %b %{RESPONSE_TIME} %{i,Referer} "%{i,User-Agent}"
# record request start time is needed to be enabled for http access logs to be able to record total request time
quarkus.http.record-request-start-time=true

# OpenAPI
quarkus.smallrye-openapi.path=/openapi.json
quarkus.smallrye-openapi.info-version=0.2.2-SNAPSHOT
quarkus.smallrye-openapi.info-title=Sendium SMS Gateway API
quarkus.smallrye-openapi.info-contact-email=support@sendium.org
quarkus.smallrye-openapi.info-contact-name=Sendium support
quarkus.smallrye-openapi.info-terms-of-service=https://www.sendium.org/terms/
quarkus.smallrye-openapi.info-license-name=GPL-3.0-only
quarkus.smallrye-openapi.info-license-url=https://github.com/cytechmobile/sendium/blob/main/LICENSE
quarkus.swagger-ui.path=/swagger-ui
quarkus.swagger-ui.always-include=true
