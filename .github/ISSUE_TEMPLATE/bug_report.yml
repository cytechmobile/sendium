name: 🐛 Bug Report
description: Create a bug report to help us improve Sendium.
title: "[BUG]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report for the Sendium Gateway! 
        Please provide as much context as possible to help us reproduce and fix the issue.
  - type: textarea
    id: what-happened
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: e.g., The gateway fails to route messages when the sender ID contains...
    validations:
      required: true
  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: What steps should we follow to reproduce the issue?
      placeholder: |
        1. Start Sendium with the attached routing config...
        2. Send an HTTP request to...
        3. Check the smppclient.log...
        4. See the error
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Sendium Version / Docker Tag
      description: Which version or Docker tag of Sendium are you running? (e.g., latest-native)
      placeholder: e.g., cytechmobile/sendium:latest-native
    validations:
      required: true
  - type: checkboxes
    id: components
    attributes:
      label: Affected Components
      description: Which parts of the gateway are involved in this bug? (Select all that apply)
      options:
        - label: SMPP Server (Inbound)
        - label: SMPP Client (Outbound)
        - label: HTTP API (Inbound)
        - label: HTTP Webhooks / DLRs (Outbound)
        - label: Routing Logic (`routingTable.conf`)
  - type: textarea
    id: configuration
    attributes:
      label: Sanitized Configuration
      description: |
        Please provide relevant parts of your `smsg.properties`, `routingTable.conf`, or `credentials.yml`.
        **IMPORTANT: Please redact all passwords, system IDs, and sensitive IPs before posting.**
      render: properties
  - type: textarea
    id: logs
    attributes:
      label: Relevant Log Output
      description: |
        Please paste any relevant log output from your mapped `/work/logs` directory (e.g., `smsg.log`, `smppclient.log`, or `smppserver.log`). 
        Use a code block (` ``` `) for formatting.
      render: shell